name: CI/CD — todo-discovery-service
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: todo-discovery-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven          # Caches ~/.m2 between runs — faster builds

      - name: Run tests
        run: mvn clean verify -B

      - name: Upload test results
        if: always()            # Upload even if tests fail — see what broke
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  build-and-push:
    name: Build Docker & Push to ECR
    runs-on: ubuntu-latest
    needs: test                 # Only runs if tests PASS
    if: github.ref == 'refs/heads/main'  # Only on main branch (not PRs)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # These secrets are set in GitHub → Settings → Secrets and variables

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        # This action automatically gets the ECR login token and runs docker login

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          # Two tags:
          # :$IMAGE_TAG (git SHA) — immutable, used for rollback
          # :latest       — always points to newest, used in dev

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Save image URI as output
        run: |
          echo "IMAGE=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── JOB 3: Deploy to Kubernetes ───────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push       # Only runs after image is pushed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name todo-eks-cluster
          # Writes ~/.kube/config so kubectl works against your EKS cluster

      - name: Update image in deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl set image deployment/todo-discovery-service \
            todo-discovery-service=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -n todo
          # Updates only the image — no other config changes
          # K8s does a rolling update automatically (zero downtime)

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/todo-discovery-service \
            -n todo \
            --timeout=120s
          # Fails the pipeline if deployment doesn't succeed in 2 min
          # This means CI/CD catches broken deployments immediately